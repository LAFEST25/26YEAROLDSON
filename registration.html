<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAFEST 26 — Registration Portal</title>
    <style>
        /* Remove default browser margins and scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Matches typical dark portal themes */
        }

        /* Make the iframe cover the entire viewport securely */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Embedded Lovable Application -->
    <iframe 
        src="https://lovable.app" 
        title="LAFEST 26 Registration Portal"
        allow="geolocation; microphone; camera; clipboard-write"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals">
    </iframe>

</body>
</html>
