        /* ---------------- PATH (UNCHANGED) ---------------- */
        function path(i) {

            const blockSize = 5;
            const block = Math.floor(i / blockSize);
            const local = i % blockSize;

            const spacing = 75;
            const z = -i * spacing;

            const t = local / blockSize * Math.PI * 2;

            let x = 0, y = 0;

            if (block === 0) {
                x = Math.cos(t) * 18;
                y = Math.sin(t) * 10;
            }

            if (block === 1) {
                x = 25 + Math.cos(t) * 22;
                y = local * 6;
            }

            if (block === 2) {
                x = -28 + Math.sin(t) * 20;
                y = -local * 5;
            }

            if (block === 3) {
                x = local * 10;
                y = Math.sin(t) * 18;
            }

            if (block >= 4) {
                x = Math.cos(t) * 30;
                y = Math.sin(t) * 22;
            }

            return new THREE.Vector3(x, y, z);
        }

        /* ---------------- LOGOS (UNCHANGED) ---------------- */
        const nodes = [];
        const loader = new THREE.TextureLoader();

        /* ---------------- PURPLE BURST EFFECT ---------------- */
        let burstParticles = null;
        const burstCount = 1500;
        const burstData = [];

        function initBurst() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(burstCount * 3);
            const colors = new Float32Array(burstCount * 3);
            
            for (let i = 0; i < burstCount; i++) {
                // Emerge from the center of the logo
                const angle = Math.random() * Math.PI * 2;
                
                // Slight cluster in the center so it's not a single point
                const radius = Math.random() * 1.5;
                const ox = Math.cos(angle) * radius;
                const oy = Math.sin(angle) * radius;
                const oz = (Math.random() - 0.5) * 1.0;

                // Move outward evenly in all directions
                const speed = 0.02 + Math.random() * 0.04;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const vz = (Math.random() - 0.5) * (speed * 0.5);

                // Initial positions
                pos[i*3] = ox;
                pos[i*3+1] = oy;
                pos[i*3+2] = oz;

                // Color (Subtle purple/blue tint)
                colors[i*3] = 0.6; // R
                colors[i*3+1] = 0.2; // G
                colors[i*3+2] = 0.9; // B

                burstData.push({
                    ox: ox,
                    oy: oy,
                    oz: oz,
                    vx: vx,
                    vy: vy,
                    vz: (Math.random() - 0.5) * (speed * 0.5),
                    life: Math.random(), // Randomize starting life
                    speed: 0.005 + Math.random() * 0.01
                });
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.15, // Much smaller, like dust/light
                transparent: true,
                opacity: 0.5,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            burstParticles = new THREE.Points(geo, mat);
            return burstParticles;
        }

        function fallback(n) {
            const c = document.createElement("canvas");
            c.width = 512; c.height = 512;
            const ctx = c.getContext("2d");

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, 512, 512);

            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 10;
            ctx.strokeRect(10, 10, 492, 492);

            ctx.fillStyle = "#000";
            ctx.font = "bold 90px Arial";
            ctx.textAlign = "center";
            ctx.fillText(n, 256, 260);

            return new THREE.CanvasTexture(c);
        }

        function make(item, i) {

            const geo = new THREE.PlaneGeometry(14, 14);
            const mesh = new THREE.Mesh(geo);

            mesh.userData = { index: item.index };

            const imgIndex = item.index;

            // Attach the purple burst to the logo 26
            if (imgIndex === 26) {
                mesh.add(initBurst());
            }

            loader.load(
                `logo/${imgIndex}.png`,
                (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;

                    mesh.material = new THREE.MeshBasicMaterial({
                        map: tex,
                        transparent: true
                    });
                },
                undefined,
                () => {
                    mesh.material = new THREE.MeshBasicMaterial({
                        map: fallback(imgIndex),
                        transparent: true
                    });
                }
            );

            scene.add(mesh);
            nodes.push(mesh);
            if (imgIndex === 25) {
                mesh.userData.is25 = true;
            }
        }

        items.forEach((it, i) => make(it, i));

        let logo25Mesh = null;

        /* ---------------- DELAYED AUTO-SCROLL ---------------- */
        let autoScroll = false;
        let autoScrollProgress = 0;
        const autoScrollTotal = 2000;
        let autoScrollPaused = false;
        let userInteracted = false;

        setTimeout(() => {
            if (!userInteracted) {
                autoScroll = true;
            }
        }, 2000);

        window.addEventListener("wheel", (e) => {
            userInteracted = true;
            const prompt = document.getElementById('poeticPrompt');
            if (prompt) prompt.style.opacity = '0';
            target += e.deltaY * 0.0018;
            target = Math.max(0, Math.min(target, items.length - 1));
        });

        // ---------------- SCROLL (wheel + touch) ----------------
        let startY = 0;
        let isDragging = false;

        // TOUCH scroll
        window.addEventListener("touchstart", (e) => {
            if (e.touches.length !== 1) return;
            startY = e.touches[0].clientY;
            isDragging = true;
            const prompt = document.getElementById('poeticPrompt');
            if (prompt) prompt.style.opacity = '0';
        });

        window.addEventListener("touchmove", (e) => {
            userInteracted = true;
            if (!isDragging) return;
            e.preventDefault(); // prevents page scroll, keeps control in 3D timeline

            const y = e.touches[0].clientY;
            const delta = startY - y;
            startY = y;

            target += delta * 0.022; // tune sensitivity
            target = Math.max(0, Math.min(target, items.length - 1));
        }, { passive: false });

        window.addEventListener("touchend", () => {
            isDragging = false;
        });

        /* ---------------- CAMERA ---------------- */
        let rotX = 0, rotY = 0;
        let tX = 0, tY = 0;

        window.addEventListener("mousemove", (e) => {
            tY = (e.clientX / innerWidth - 0.5) * 1.2;
            tX = (e.clientY / innerHeight - 0.5) * 0.8;
        });

        /* ---------------- CLICK ---------------- */
        const ray = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener("click", (e) => {

            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;

            ray.setFromCamera(mouse, camera);

            const hit = ray.intersectObjects(nodes, false);

            if (hit.length) {
                let hitObject = hit[0].object;
                while (hitObject && hitObject.userData.index === undefined) {
                    hitObject = hitObject.parent;
                }
                if (hitObject && hitObject.userData.index !== undefined) {
                    openModal(hitObject.userData.index);
                }
            }
        });

        /* ---------------- MODAL ---------------- */
        function openModal(idx) {

            const data = yearData[idx] || {
                title: `LA Fest Entry ${idx}`,
                desc: `Archival festival memory for timeline slot ${idx}.`
            };

            document.getElementById("modal").style.display = "flex";
            setTimeout(() => document.getElementById("modal").style.opacity = 1, 10);

            // document.getElementById("mYear").innerText = ` LA FEST ${idx}`;
            document.getElementById("mTitle").innerText = data.title;
            document.getElementById("mDesc").innerText = data.desc;
                // ┌────────────────────────────────────────────┐
                // │ PAUSE AUTO‑SCROLL WHILE MODAL IS OPEN    │
                // └────────────────────────────────────────────┘
            autoScrollPaused = true;
        }

        function closeModal() {
            document.getElementById("modal").style.opacity = 0;
            setTimeout(() => document.getElementById("modal").style.display = "none", 300);
            autoScrollPaused = false;
        }

        /* ---------------- ANIMATION (STAR FIX INCLUDED ONLY HERE) ---------------- */
        let target = 0;
        let current = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (!logo25Mesh) {
                logo25Mesh = nodes.find(n => n.userData.is25);
            }

            // Auto‑scroll only if not stopped by user
            if (autoScroll && !userInteracted && !autoScrollPaused) {
                autoScrollProgress++;
                if (autoScrollProgress <= autoScrollTotal) {
                    target = (items.length - 1) * (autoScrollProgress / autoScrollTotal);
                } else {
                    autoScroll = false;
                }
            }


            current += (target - current) * 0.05;

            const i = Math.floor(current);
            const f = current - i;

            const a = path(i);
            const b = path(i + 1);

            const pos = new THREE.Vector3().lerpVectors(a, b, f);

            /* 🔥 FIX: STARFIELD NOW FOLLOWS CAMERA PROPERLY */
            stars.position.copy(camera.position);
            stars.position.multiplyScalar(0.05);

            nodes.forEach((n, idx) => {
                const p = path(idx);
                n.position.copy(p);
                n.lookAt(camera.position);
            });

            // Update purple burst particles
            if (burstParticles) {
                const positions = burstParticles.geometry.attributes.position.array;
                const colors = burstParticles.geometry.attributes.color.array;

                for (let j = 0; j < burstCount; j++) {
                    const data = burstData[j];
                    data.life += data.speed;
                    
                    if (data.life >= 1) {
                        data.life = 0;
                        positions[j * 3] = data.ox;
                        positions[j * 3 + 1] = data.oy;
                        positions[j * 3 + 2] = data.oz;
                    } else {
                        positions[j * 3] += data.vx;
                        positions[j * 3 + 1] += data.vy;
                        positions[j * 3 + 2] += data.vz;
                    }

                    // Fade out based on life
                    const alpha = 1.0 - data.life;
                    colors[j * 3] = 0.6 * alpha;     // R
                    colors[j * 3 + 1] = 0.2 * alpha; // G
                    colors[j * 3 + 2] = 0.9 * alpha; // B
                }
                burstParticles.geometry.attributes.position.needsUpdate = true;
                burstParticles.geometry.attributes.color.needsUpdate = true;
            }

            rotX += (tX - rotX) * 0.05;
            rotY += (tY - rotY) * 0.05;

            camera.position.x = pos.x + Math.sin(rotY) * 10;
            camera.position.y = pos.y + Math.sin(rotX) * 8 + 12;
            camera.position.z = pos.z + 60 + Math.cos(rotY) * 10;

            camera.lookAt(pos.x, pos.y, pos.z);

            // Aura Overlay logic for 25
            if (logo25Mesh) {
                const auraContainer = document.getElementById('auraTextContainer');
                
                if (auraContainer) {
                    if (typeof window.auraState === 'undefined') window.auraState = 'hidden';
                    
                    const tempV = new THREE.Vector3();
                    tempV.copy(logo25Mesh.position);
                    tempV.project(camera);
                    
                    const dist = camera.position.distanceTo(logo25Mesh.position);
                    const now = performance.now();

                    // Map state strictly by scroll progress ('current')
                    // current starts at 0 (Logo 26), and Logo 25 is exactly at current = 1.0
                    if (current < 0.96) {
                        window.auraState = 'approaching';
                    } else if (current >= 0.96 && current < 1.08) {
                        window.auraState = 'locked';
                    } else if (current >= 1.08) {
                        if (window.auraState === 'locked' || window.auraState === 'approaching') {
                            window.auraState = 'pinned_fading';
                            window.auraPinnedTime = now;
                        } else if (window.auraState !== 'pinned_fading') {
                            window.auraState = 'hidden';
                        }
                    }

                    if (!window.lastAuraX) {
                        window.lastAuraX = innerWidth / 2;
                        window.lastAuraY = innerHeight / 2;
                    }

                    if (window.auraState === 'approaching') {
                        if (dist < 150 && tempV.z < 1) { 
                            // Only track while clearly visible in front of camera
                            auraContainer.style.opacity = Math.max(0, 1 - (dist - 65) / 85);
                            const x = (tempV.x * .5 + .5) * innerWidth;
                            const y = (tempV.y * -.5 + .5) * innerHeight;
                            
                            window.lastAuraX = x;
                            window.lastAuraY = y;
                            
                            const textBase = document.getElementById('auraTextBase');
                            if (textBase) {
                                textBase.style.transition = 'none';
                                textBase.style.left = `${x}px`;
                                textBase.style.top = `${y}px`;
                            }
                        } else {
                            auraContainer.style.opacity = 0;
                        }
                    } else if (window.auraState === 'locked') {
                        // Freeze exactly on screen at the apex of user focus
                        auraContainer.style.opacity = 1;
                        const textBase = document.getElementById('auraTextBase');
                        if (textBase) {
                            textBase.style.transition = 'none';
                            textBase.style.left = `${window.lastAuraX}px`;
                            textBase.style.top = `${window.lastAuraY}px`;
                        }
                    } else if (window.auraState === 'pinned_fading') {
                        // Keep pinned exactly on screen. Fade out over 3 seconds.
                        const elapsed = now - (window.auraPinnedTime || now);
                        if (elapsed < 3000) {
                            auraContainer.style.opacity = elapsed > 2000 ? 1 - ((elapsed - 2000) / 1000) : 1;
                            const textBase = document.getElementById('auraTextBase');
                            if (textBase) {
                                textBase.style.transition = 'none';
                                textBase.style.left = `${window.lastAuraX}px`;
                                textBase.style.top = `${window.lastAuraY}px`;
                            }
                        } else {
                            auraContainer.style.opacity = 0;
                        }
                    } else {
                        auraContainer.style.opacity = 0;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        /* ---------------- RESIZE ---------------- */
        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

    </script>

        <script>
        const nav = document.getElementById("navContainer");
    const toggle = document.getElementById("navToggle");

// Toggle on click (good for mobile)
toggle.addEventListener("click", () => {
  nav.classList.toggle("active");
});

// Optional: hover support for desktop
nav.addEventListener("mouseenter", () => {
  nav.classList.add("active");
});

nav.addEventListener("mouseleave", () => {
  nav.classList.remove("active");
});
    </script>
